# Netlify build configuration
# Place this file in the app/ directory

[build]
  base    = "app"          # folder containing package.json
  command = "npm run build"
  publish = "app/dist"     # Vite output folder

# SPA routing — all routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
